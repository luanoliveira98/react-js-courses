<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rocketseat - React.js - Fundamentals</title>
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      function InputFocus() {
        const ref = React.useRef(null);

        function handleClick() {
          ref?.current?.focus();
        }

        return (
          <div className="space-x-2">
            <input
              ref={ref}
              type="text"
              className="p-2 border"
              placeholder="Click on button to focus"
            />
            <button onClick={handleClick} className="p-2 border">
              Focus on input
            </button>
          </div>
        );
      }

      function ScrollTracker() {
        const containerRef = React.useRef(null);
        const [scrollInfo, setScrollInfo] = React.useState({
          scrollTop: 0,
          scrollHeight: 0,
          clientHeight: 0,
        });
        const [scrollPercentage, setScrollPercentage] = React.useState(0);

        function handleContainerScroll() {
          if (!containerRef.current) {
            return;
          }

          const { scrollTop, scrollHeight, clientHeight } =
            containerRef.current;

          setScrollInfo({ scrollTop, scrollHeight, clientHeight });

          const maxScrollTop = scrollHeight - clientHeight;
          const percentage = Math.round((scrollTop / maxScrollTop) * 100);

          setScrollPercentage(percentage);
        }

        return (
          <div class="space-y-4">
            <div
              class="border boder-solid border-blue-500 p-4 h-60 overflow-y-auto"
              ref={containerRef}
              onScroll={handleContainerScroll}
            >
              <div className="space-y-4">
                {Array.from({ length: 20 }, (_, index) => (
                  <p key={index}>Item {index + 1}</p>
                ))}
              </div>
            </div>

            <ul class="space-y-2 list-disc pl-5">
              <li>Scroll progress: {scrollPercentage}%</li>
              <li>Where is the scroll (scrollTop): {scrollInfo.scrollTop}</li>
              <li>Scroll height: {scrollInfo.scrollHeight}</li>
              <li>Container height: {scrollInfo.clientHeight}</li>
            </ul>
          </div>
        );
      }

      function App() {
        return (
          <main className="p-3 space-y-6">
            <InputFocus />

            <hr />

            <ScrollTracker />
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
